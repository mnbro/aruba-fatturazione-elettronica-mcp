name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [master]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages-enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --all-extras --dev
      - run: uv run mkdocs build --strict
      - name: Check Pages configuration
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages is not enabled for this repository. Enable Pages with GitHub Actions as the source to deploy documentation."
          fi
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v6
      - if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && needs.build.outputs.pages-enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
