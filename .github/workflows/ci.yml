name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv lock --check
      - run: uv sync --locked --all-extras --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest --cov=aruba_fatturazione_elettronica_mcp --cov-report=xml --cov-report=term-missing
      - run: uv run mkdocs build --strict
      - run: uv build
      - run: uv pip check
      - uses: codecov/codecov-action@v6
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
