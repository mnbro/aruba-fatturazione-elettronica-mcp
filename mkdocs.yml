site_name: Aruba Fatturazione Elettronica MCP Read-only
site_url: https://mnbro.github.io/aruba-fatturazione-elettronica-mcp/
repo_url: https://github.com/mnbro/aruba-fatturazione-elettronica-mcp
repo_name: v0.4.0
theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy
nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Docker: docker.md
  - Tools: tools.md
  - LLM Tools: llm-tools.md
  - API Parity: api-parity.md
  - Security: security.md
  - Development: development.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
strict: true
